<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

<nav>
    <a class="logo" href="index.html">
        <img src="/imgs/nebula-03.svg" alt="Logo Nébula" width="100">
    </a>

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="menu-button">
        <span></span>
        <span></span>
        <span></span>
    </label>

    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="iniciar-sesion.html">Iniciar Sesión</a></li>
        <li><a href="registro.html">Registrarse</a></li>
        <li><a href="/cerrar-sesion">Cerrar Sesión</a></li>
    </ul>
</nav>

<main class="auth-container">
    <section class="auth-card">
        <div class="form-logo">
            <img src="./imgs/nebula-03.svg" alt="Logo Nébula">
        </div>

        <div class="form-header">
            <h3>Crear Cuenta</h3>
            <p class="form-subtitle">Regístrate en la mejor app musical</p>
        </div>

        <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" name="nombre" id="nombre" placeholder="ej. Juanito Perez" required minlength="20">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" name="correo" id="correo" placeholder="juanito@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="contrasenia">Contraseña:</label>
                <input type="password" name="contrasenia" id="contrasenia" required placeholder="Mínimo 8 caracteres">
            </div>

            <div class="form-group">
                <label for="usuario">Pseudónimo:</label>
                <input type="text" id="usuario" name="usuario" pattern="[a-zA-Z]{3,10}-[0-9]{2,10}" placeholder="Nebula-2025" required>
            </div>

            <div class="form-group">
                <label>Género:</label>
                <div class="radio-group">
                    <input type="radio" name="genero" id="rad_femenino" value="femenino" required>
                    <label for="rad_femenino">Femenino</label>

                    <input type="radio" name="genero" id="rad_masculino" value="masculino" required>
                    <label for="rad_masculino">Masculino</label>

                    <input type="radio" name="genero" id="rad_otro" value="otro" required>
                    <label for="rad_otro">Otro / Prefiero no decir</label>
                </div>
            </div>

            <div class="form-group">
                <label for="suscripcion">Tipo Suscripción:</label>
                <select name="suscripcion" id="suscripcion" required>
                    <option value="">--Selecciona una opcion--</option>
                    <option value="gratis">Gratis</option>
                    <option value="mensual">Premium Mensual</option>
                    <option value="anual">Premium Anual</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fechanacimiento">Fecha Nacimiento:</label>
                <input type="date" name="fechanacimiento" id="fechanacimiento" required>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" name="terminos" id="terminos" required>
                <label for="terminos">Acepto los términos y condiciones de uso</label>
            </div>

            <div class="form-group">
                <label for="comentarios">Comentarios adicionales o gustos:</label>
                <textarea name="comentarios" id="comentarios" rows="3" placeholder="Cuéntanos más sobre tus gustos musicales..."></textarea>
            </div>

            <div class="form-group">
                <button type="submit">Crear Cuenta</button>
            </div>
        </form>
        <p class="auth-switch">¿Ya tienes una cuenta? <a href="iniciar-sesion.html">Iniciar Sesión</a></p>
    </section>
</main>

<footer>
    <p>Copyright Nébula 2025.</p>
</footer>

</body>
</html>
