<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nébula Music - Registro</title>
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>

    <main class="auth-container">
        <section class="auth-card">
            
            <!-- TAREA PARA EL ALUMNO:
                 Crea un formulario que envíe los datos mediante POST a "/crear-cuenta".
                 Debe contener campos para:
                 - Nombre completo (texto)
                 - Correo electrónico (email)
                 - Contraseña (password)
                 - Pseudónimo (texto con patrón de validación: [letras de 3 a 10]-[números de 2 a 10])
                 - Género (radio buttons: Femenino, Masculino, Otro)
                 - Tipo de Suscripción (select: Gratis, Premium Mensual, Premium Anual)
                 - Fecha de nacimiento (date)
                 - Aceptar términos y condiciones (checkbox)
                 - Comentarios adicionales o gustos (textarea)
            -->
            <form class="auth-form" method="post" action="/crear-cuenta" enctype="application/x-www-form-urlencoded">
                <h2>Crear cuenta</h2>
                <div>
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" name="nombre" id="nombre" placeholder="ej. Marco Escamlla Valenzuela" required minlength="20">
                </div>
                <div>
                    <label for="correo">Correo Electronico:</label>
                    <input type="email" name="correo" id="correo" placeholder="marco@gmail.com" required>
                </div>
                <div>
                    <label for="contrasenia">Contraseña:</label>
                    <input type="password" name="contrasenia" id="contrasenia" required placeholder="123456">
                </div>
                <div>
                    <label for="usuario">Nombre de Usuario</label>
                    <input type="text" id="usuario" name="usuario" pattern="[a-zA-Z]{3,10}-[0,9]{2-10}" placeholder="Nebula-2025">
                </div>
                <div>
                    <label>Genero</label>
                    <div>
                        <input type="radio" name="rad_masculino" id="rad_masculino" value="masculino" required>
                        <label for="rad_masculino">Masculino</label>
                        <input type="radio" name=rad_femenino"" id="rad_femenino" value="femmenino" required>
                        <label for="rad_femenino">Feminino</label>
                    </div>
                </div>
                <div>
                    <label for="suscripcion">Tipo de Suscripcion:</label>
                    <select name="suscripcion" id="suscripcion" required>
                        <option value="">Seleccione una opcion</option>
                        <option value="gratis">Gratis</option>
                        <option value="mensual">Mensualidad</option>
                        <option value="anual">Anual</option>
                    </select>
                    </div>
                <div>
                    <label for="fechanacimiento">Fecha de Nacimiento:</label>
                    <input type="date" name="fechanacimiento" id="fechanacimiento"required>
                </div>
                <div>
                    <label for="comentarios">Comentarios:</label>
                    <textarea name="comentarios" id="comentarios" rows="4" placeholder="Cuentanos mas sobre ti"></textarea>
                </div>
            </form>
            <p>Ya tienes una cuenta?<a href="iniciar-sesion.html"> Iniciar Sesion</a></p>

        </section>
    </main>

    <footer>
        <p>Copyright Nébula 2025.</p>
    </footer>

</body>
</html>
